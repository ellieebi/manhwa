name: دانلود و ذخیره خودکار صفحه

on:
  workflow_dispatch:   # با دکمه دستی اجرا بشه

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # اجازه آپلود فایل توی پروژه رو میده
    steps:
      - name: دریافت کدهای پروژه
        uses: actions/checkout@v4

      - name: دانلود صفحه از اینترنت
        run: curl -L -o saved-page.html "https://zinchangmanga.net/"

      - name: ذخیره فایل توی پروژه
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add saved-page.html
          git commit -m "صفحه جدید ذخیره شد" || echo "تغییری نبود"
          git push
